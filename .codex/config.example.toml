# Context7 MCP para OpenAI Codex
# Copie este arquivo para .codex/config.toml.
# Defina CONTEXT7_API_KEY fora do repositorio.
# Nunca faca commit de chaves reais ou snapshots com dados sensiveis.

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]
env_vars = ["CONTEXT7_API_KEY"]
startup_timeout_sec = 40
tool_timeout_sec = 60
enabled = true
